<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YASGM</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <div class="top-bar">
        <h1>YASGM</h1>
        <nav class="view-nav">
          <button id="nav-library" class="nav-btn selected" type="button">Library</button>
          <button id="nav-settings" class="nav-btn" type="button">Settings</button>
        </nav>
      </div>

      <div id="library-view" class="shell">
        <aside id="games-list"></aside>

        <section id="detail">
          <p id="detail-empty">Select a game to view its settings and versions.</p>

          <div id="detail-content" class="hidden">
            <div class="detail-header">
              <h2 id="detail-title"></h2>
              <span id="detail-appid" class="muted"></span>
            </div>

            <div class="settings-row">
              <label
                >Mode
                <select id="mode-select"></select>
              </label>
              <label
                >Keep
                <input id="keep-input" type="number" min="1" class="keep-input" />
              </label>
              <button id="save-btn">Save</button>
              <button id="reset-btn">Reset</button>
            </div>

            <div class="settings-row">
              <button id="open-saves-btn" type="button">Open save location</button>
              <button id="open-backups-btn" type="button">Open backups location</button>
              <span id="open-location-msg" class="muted"></span>
            </div>

            <h3>Versions</h3>
            <div id="versions-list"></div>
          </div>
        </section>
      </div>

      <div id="settings-view" class="settings-page hidden">
        <section class="settings-section">
          <h3>Appearance</h3>
          <div id="theme-switch" class="segmented" role="group" aria-label="Appearance">
            <button type="button" class="segment" data-theme-option="system">System</button>
            <button type="button" class="segment" data-theme-option="light">Light</button>
            <button type="button" class="segment" data-theme-option="dark">Dark</button>
          </div>
        </section>

        <section class="settings-section">
          <h3>Cloud provider</h3>
          <p id="provider-current" class="muted"></p>

          <div class="settings-row">
            <button id="provider-check-btn" type="button">Check connection</button>
          </div>
          <p id="provider-status-msg" class="muted"></p>

          <div class="provider-option">
            <div class="provider-option-header">
              <strong>OneDrive</strong>
              <button id="provider-onedrive-btn" type="button">Use OneDrive</button>
            </div>
            <div class="settings-row">
              <button id="provider-auth-btn" type="button">Sign in…</button>
              <span id="provider-auth-msg" class="muted"></span>
            </div>
          </div>

          <div class="provider-option">
            <div class="provider-option-header">
              <strong>Local folder</strong>
            </div>
            <div class="settings-row">
              <input id="provider-local-path" type="text" placeholder="/path/to/sync/folder" />
              <button id="provider-local-btn" type="button">Use this folder</button>
            </div>
          </div>
        </section>

        <section class="settings-section">
          <h3>Autostart</h3>
          <label class="toggle-row">
            <input id="autostart-toggle" type="checkbox" />
            Launch YASGM's sync daemon at login
          </label>
          <p id="autostart-detail" class="muted"></p>
        </section>
      </div>

      <p id="status-msg"></p>
    </main>
  </body>
</html>
