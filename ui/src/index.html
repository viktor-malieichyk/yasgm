<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YASGM</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>YASGM</h1>

      <div class="shell">
        <aside id="games-list"></aside>

        <section id="detail">
          <p id="detail-empty">Select a game to view its settings and versions.</p>

          <div id="detail-content" class="hidden">
            <div class="detail-header">
              <h2 id="detail-title"></h2>
              <span id="detail-appid" class="muted"></span>
            </div>

            <div class="settings-row">
              <label
                >Mode
                <select id="mode-select"></select>
              </label>
              <label
                >Keep
                <input id="keep-input" type="number" min="1" class="keep-input" />
              </label>
              <button id="save-btn">Save</button>
              <button id="reset-btn">Reset</button>
            </div>

            <h3>Versions</h3>
            <div id="versions-list"></div>
          </div>
        </section>
      </div>

      <p id="status-msg"></p>
    </main>
  </body>
</html>
